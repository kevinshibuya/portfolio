    <!-- Preload the regular variable font so it lands during HTML parse — keeps
         font-display: swap from delaying first paint on slow mobile networks.
         WOFF2 variant is ~65% smaller than the TTF source and is used by every
         supported browser (Edge 14+, all evergreen). -->
    <link
      rel="preload"
      href="/fonts/PlusJakartaSans-VariableFont_wght.woff2"
      as="font"
      type="font/woff2"
      crossorigin="anonymous"
    />
    <!-- Critical loader CSS, inlined so the dark ink curtain paints with the
         first frame of HTML — before the Vite-bundled stylesheet arrives.
         Mirrors src/index.css; the cascade is a no-op once the bundled sheet
         replaces them.

         Structure & LCP trick: at first paint there's a single
         .loader-mark--whole text span centered in the viewport ("ks" + a
         styled blue dot), sitting on top of two solid ink panels. Its
         bounding rect is what Chrome's LCP algorithm measures, so LCP
         locks here before React boots. Two extra tear-half siblings render
         the same markup; they're clipped via clip-path to top/bottom halves
         and visibility:hidden at first paint so they don't count as LCP
         candidates. On exit, the whole-mark flips visibility:hidden and
         the two halves flip visibility:visible (pixel-identical swap) then
         translate ±50vh with the panels — re-creating the tear effect
         while keeping the whole-mark's LCP timestamp locked. -->
    <style>
      html[data-loading='true'] { overflow: hidden; }
      @font-face {
        font-family: 'Plus Jakarta Sans';
        src: url('/fonts/PlusJakartaSans-VariableFont_wght.woff2') format('woff2-variations'),
             url('/fonts/PlusJakartaSans-VariableFont_wght.woff2') format('woff2');
        font-weight: 200 800;
        font-style: normal;
        font-display: swap;
      }
      #loader {
        position: fixed; inset: 0; z-index: 9999;
        pointer-events: none;
        display: flex; align-items: center; justify-content: center;
      }
      .loader-half {
        position: fixed; left: 0; width: 100vw; height: 50vh;
        background: #0B0E14;
        transition: transform 600ms cubic-bezier(0.85, 0, 0.15, 1);
        will-change: transform;
      }
      .loader-half--top    { top: 0;    }
      .loader-half--bottom { bottom: 0; }
      .loader-mark {
        font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
        font-size: clamp(140px, 30vw, 320px);
        font-weight: 700; line-height: 1; letter-spacing: -0.05em;
        text-transform: lowercase; color: #F5F2EC;
        white-space: nowrap;
      }
      .loader-mark__dot {
        display: inline-block;
        width: 0.18em; height: 0.18em;
        border-radius: 50%;
        background: #4D80E6; /* --accent-blue — fallback hex */
        vertical-align: baseline;
        margin-left: 0.02em;
      }
      .loader-mark--whole { position: relative; z-index: 1; }
      .loader-mark--top,
      .loader-mark--bottom {
        position: absolute; top: 50%; left: 50%;
        transform: translate(-50%, -50%);
        z-index: 2; visibility: hidden;
        transition: transform 600ms cubic-bezier(0.85, 0, 0.15, 1);
      }
      .loader-mark--top    { clip-path: inset(0 0 50% 0); }
      .loader-mark--bottom { clip-path: inset(50% 0 0 0); }
      #loader.loader--exit .loader-half--top    { transform: translateY(-100%); }
      #loader.loader--exit .loader-half--bottom { transform: translateY(100%);  }
      #loader.loader--exit .loader-mark--whole  { visibility: hidden; }
      #loader.loader--exit .loader-mark--top,
      #loader.loader--exit .loader-mark--bottom { visibility: visible; }
      #loader.loader--exit .loader-mark--top    { transform: translate(-50%, calc(-50% - 50vh)); }
      #loader.loader--exit .loader-mark--bottom { transform: translate(-50%, calc(-50% + 50vh)); }
      @media (prefers-reduced-motion: reduce) {
        .loader-half, .loader-mark--top, .loader-mark--bottom { transition: none; }
        #loader { transition: opacity 150ms ease-out; }
        #loader.loader--exit { opacity: 0; }
      }
    </style>
    <script>
      // Lock html scroll while the loader is up. Set BEFORE React parses so
      // the document's initial render is already scroll-locked — prevents a
      // one-frame flash of scrollable content underneath the curtain on slow
      // networks. main.tsx clears this attribute when it removes the loader.
      //
      // We can only target <html> here: this script runs in <head>, so
      // document.body is null at this point. A previous version also added
      // a body.is-loading class as a belt-and-suspenders backup, but the
      // body wasn't parsed yet so the call was always a no-op — removed.
      document.documentElement.dataset.loading = 'true'
    </script>
  </head>
  <body>
    <!-- LOADER + CURTAIN. Two ink .loader-half panels paint at first frame;
         the .loader-mark--whole text span on top of them is the LCP
         candidate (locked at first paint per W3C LCP spec, before React
         mounts). The two tear-half siblings render the same "ks." markup
         — they're visibility:hidden so they don't count as LCP candidates
         until exit. When main.tsx adds .loader--exit, the whole-mark
         hides, the two halves become visible at the exact same pixel
         position (instant, invisible swap) and then animate ±50vh with
         their panels, re-creating the tear effect. -->
    <div id="loader" aria-hidden="true">
      <div class="loader-half loader-half--top"></div>
      <div class="loader-half loader-half--bottom"></div>
      <span class="loader-mark loader-mark--whole">ks<span class="loader-mark__dot"></span></span>
      <span class="loader-mark loader-mark--top" aria-hidden="true">ks<span class="loader-mark__dot"></span></span>
      <span class="loader-mark loader-mark--bottom" aria-hidden="true">ks<span class="loader-mark__dot"></span></span>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
